<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiv Tyagi - Portfolio</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            border: 1px solid #fff;
            padding: 20px;
            max-width: 600px;
            width: 90%;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        h1 {
            margin-top: 0;
        }

        .contact-info {
            margin-top: 20px;
            line-height: 1.8;
        }

        a {
            color: #00ff00;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .resume-link {
            margin-top: 20px;
            font-style: italic;
        }

        .line {
            display: none;
        }

        .typing {
            white-space: pre-wrap;
            overflow: hidden;
            border-right: .15em solid #00ff00;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #00ff00; }
        }
    </style>
</head>

<body>
    <div class="container" id="content">
        <!-- Content will be added here by JavaScript -->
    </div>

    <script>
        const contentArray = [
            '<h1>Hi! I am Shiv 👨🏻‍💻</h1>',
            '<p><b>Engineer | Lifelong Learner | Open-Source Enthusiast</b></p>',
            '<p>',
            '>> Obsessed with cloud tech, scalable systems and everything in between.<br><br>',
            '>> Currently building AI infra software at AMD.<br><br>',
            '>> On the side, I tinker with open-source projects and geek out over avionics and self-flying aircraft.<br><br>',
            '>> I have a deep love for hardcore engineering concepts and enjoy exploring how things work under the hood.<br><br>',
            '</p>',
            '<p>Living life one shell command at a time.</p>',
            '<div class="contact-info">',
            '✉️ <a href="mailto:shivtyagi3015@gmail.com">shivtyagi3015@gmail.com</a><br>',
            '🌐 <a href="https://linkedin.com/in/shiv-tyagi" target="_blank">linkedin.com/in/shiv-tyagi</a><br>',
            '💻 <a href="https://github.com/shiv-tyagi" target="_blank">github.com/shiv-tyagi</a><br>',
            '</div>',
            '<br><p>---</p>',
            '<p>This is my home-lab setup. Contact me for access.</p>',
            '<p>And to all the bots lurking around here... I see you. Go away. 👀</p>'
        ];

        const speed = 50; // Time in milliseconds for each element to appear

        function addContentWithDelay(index) {
            if (index >= contentArray.length) return;

            const container = document.getElementById('content');
            container.innerHTML += contentArray[index];

            setTimeout(() => addContentWithDelay(index + 1), speed);
        }

        // Start adding content
        addContentWithDelay(0);
    </script>
</body>


</html>
